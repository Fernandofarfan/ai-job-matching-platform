name: EmpleoIA CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Linting ──────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          # Errores críticos: sintaxis y módulos no definidos
          flake8 app.py db_config.py resume_parser.py utils.py \
            --max-line-length=120 \
            --select=E1,E9,F4,F8,W \
            --exclude=.venv,__pycache__,.git \
            --count --statistics
        continue-on-error: false

  # ─── Tests ────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            Flask==2.3.3 \
            Werkzeug==2.3.7 \
            flask-socketio==5.3.6 \
            eventlet==0.35.2 \
            pandas \
            numpy \
            python-dotenv==1.0.0 \
            mysql-connector-python \
            openpyxl \
            reportlab \
            pytest \
            pytest-flask \
            PyPDF2 \
            python-docx \
            scikit-learn \
            spacy \
            nltk

      - name: Download spacy model (small, for CI)
        run: python -m spacy download es_core_news_sm || true

      - name: Create required directories
        run: mkdir -p uploads results logs profiles temp/test_tasks

      - name: Create minimal .env for testing
        run: |
          cat > .env << 'EOF'
          DB_HOST=localhost
          DB_USER=root
          DB_PASSWORD=
          DB_NAME=job_tracker
          DB_POOL_NAME=job_pool_test
          DB_POOL_SIZE=1
          SECRET_KEY=test-secret-key-ci-12345
          GEMINI_API_KEY=fake-key-for-testing
          EOF

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --ignore=tests/test_resume_parser.py \
            -x

      - name: Run resume parser tests (best-effort)
        run: |
          python -m pytest tests/test_resume_parser.py -v --tb=short || true
        continue-on-error: true

  # ─── Resumen de estado ────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Print CI Result
        run: |
          echo "================================================="
          echo "EmpleoIA CI/CD Pipeline Completed"
          echo "Lint:  ${{ needs.lint.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "================================================="
